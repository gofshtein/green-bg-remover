<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Background Remover</title>
    <meta name="description" content="Remove #00b140 green background from images instantly">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app-container">
        <header class="header">
            <div class="logo">
                <div class="logo-icon"></div>
                <h1>Green BG Remover</h1>
            </div>
            <p class="subtitle">Remove <span class="color-badge">#00b140</span> background instantly</p>
        </header>

        <main class="main-content">
            <div class="upload-section" id="uploadSection">
                <div class="upload-zone" id="uploadZone">
                    <div class="upload-icon">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.5">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                            <polyline points="17,8 12,3 7,8" />
                            <line x1="12" y1="3" x2="12" y2="15" />
                        </svg>
                    </div>
                    <h2>Drop your image here</h2>
                    <p>or click to browse</p>
                    <input type="file" id="fileInput" accept="image/*" hidden>
                </div>
            </div>

            <div class="editor-section" id="editorSection" style="display: none;">
                <div class="controls-bar">
                    <div class="color-control">
                        <label for="targetColor">Target Color:</label>
                        <input type="color" id="targetColor" value="#00b140">
                        <span id="colorHex">#00b140</span>
                    </div>
                    <div class="tolerance-control">
                        <label for="tolerance">Tolerance:</label>
                        <input type="range" id="tolerance" min="0" max="100" value="45">
                        <span id="toleranceValue">45</span>
                    </div>
                    <div class="watermark-control">
                        <label class="checkbox-label">
                            <input type="checkbox" id="removeWatermark" checked>
                            <span class="checkbox-custom"></span>
                            Remove Gemini ✦ Watermark
                        </label>
                    </div>
                    <div class="button-group">
                        <button class="btn btn-secondary" id="resetBtn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                                <path d="M3 3v5h5" />
                            </svg>
                            Reset
                        </button>
                        <button class="btn btn-primary" id="downloadBtn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                                <polyline points="7,10 12,15 17,10" />
                                <line x1="12" y1="15" x2="12" y2="3" />
                            </svg>
                            Download PNG
                        </button>
                    </div>
                </div>

                <div class="preview-container">
                    <div class="preview-panel">
                        <h3>Original</h3>
                        <div class="canvas-wrapper">
                            <canvas id="originalCanvas"></canvas>
                        </div>
                    </div>
                    <div class="arrow-divider">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M5 12h14" />
                            <path d="M12 5l7 7-7 7" />
                        </svg>
                    </div>
                    <div class="preview-panel">
                        <h3>Result</h3>
                        <div class="canvas-wrapper checkered">
                            <canvas id="resultCanvas"></canvas>
                        </div>
                    </div>
                </div>

                <button class="btn btn-new" id="newImageBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19" />
                        <line x1="5" y1="12" x2="19" y2="12" />
                    </svg>
                    Upload New Image
                </button>
            </div>
        </main>

        <footer class="footer">
            <p>Target color: <span class="color-swatch"></span> #00b140 (Green)</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>

</html>
